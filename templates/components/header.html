<!-- 适配 iframe 内嵌至 PPT 时的左右翻页逻辑 -->
<script>
document.addEventListener('keydown', function(e) {
    // 焦点在输入框时不触发翻页（如填写弹幕时），虽然本页面没有但保险起见加个判断
    if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'textarea') {
        return;
    }
    
    if (e.key === 'ArrowLeft' || e.keyCode === 37) {
        if (window.parent && window.parent !== window && window.parent.Reveal) {
            e.preventDefault();
            window.parent.focus(); // 将焦点交回给父级课件
            window.parent.Reveal.left();
        }
    } else if (e.key === 'ArrowRight' || e.keyCode === 39) {
        if (window.parent && window.parent !== window && window.parent.Reveal) {
            e.preventDefault();
            window.parent.focus(); // 将焦点交回给父级课件
            window.parent.Reveal.right();
        }
    }
});
</script>
